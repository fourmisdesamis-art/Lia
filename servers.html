```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lia - Serveurs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#7a5cff33,transparent 30%),
radial-gradient(circle at bottom right,#3d5cff33,transparent 30%);
z-index:-2;
}

.topbar{
height:90px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo-area{
display:flex;
align-items:center;
gap:15px;
}

.logo{
height:55px;
}

.logo-area h1{
font-size:2rem;
font-weight:800;
background:linear-gradient(90deg,#a855f7,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.user{
background:#111;
padding:12px 18px;
border-radius:15px;
border:1px solid rgba(139,92,246,.2);
}

.container{
max-width:1400px;
margin:auto;
padding:60px 30px;
}

.breadcrumb{
color:#8b5cf6;
margin-bottom:30px;
font-weight:600;
}

.title{
text-align:center;
margin-bottom:60px;
}

.title h2{
font-size:3rem;
margin-bottom:15px;
}

.title p{
color:#bdbdbd;
}

.servers{
display:flex;
justify-content:center;
}

.server-card{

width:700px;
height:380px;

border-radius:30px;

overflow:hidden;

cursor:pointer;

position:relative;

background:
linear-gradient(
rgba(0,0,0,.3),
rgba(0,0,0,.75)
),

url("https://images.unsplash.com/photo-1518709268805-4e9042af2176?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

border:1px solid rgba(139,92,246,.25);

transition:.35s;

}

.server-card:hover{

transform:
translateY(-10px)
scale(1.02);

box-shadow:
0 0 50px rgba(139,92,246,.35);

}

.overlay{
position:absolute;
inset:0;

display:flex;
flex-direction:column;

}

.server-name{
font-size:3rem;

}

.server-desc{

}

.server-status{

background:#22c55e;

padding:8px 15px;

border-radius:999px;

font-weight:600;

}

@media(max-width:768px){

.server-card{
height:300px;
}

.server-name{
font-size:2rem;
}

.title h2{
font-size:2rem;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="logo-area">
<img src="Lia.png" class="logo">
<h1>Lia</h1>
</div>

<div class="user">
👤 <span id="pseudo">Chargement...</span>
</div>

</div>

<div class="container">

<div class="breadcrumb">
Lia > Lumalia
</div>

<div class="title">

<h2>Choisissez votre serveur</h2>

<p>
Sélectionnez le serveur que vous souhaitez administrer.
</p>

</div>

<div class="servers">

<div class="server-card" onclick="openServer()">

<div class="server-status">
En ligne
</div>

<div class="overlay">

<div class="server-name">
🔷 Diamant
</div>

<div class="server-desc">
Gestion du serveur Diamant de Lumalia
</div>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBSCqSsBTXk9Q8sBX88NgrdDHUAHT0Cq6I",
authDomain: "lumalia.firebaseapp.com",
projectId: "lumalia"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="index.html";
return;

}

const snap =
await getDoc(
doc(db,"users",user.uid)
);

if(snap.exists()){

document.getElementById("pseudo").innerText =
snap.data().pseudoMinecraft;

}

});

window.openServer = function(){

window.location.href =
"dashboard.html?server=diamant";

}

</script>

</body>
</html>
